# Publishes this static site to GitLab Pages.
# GitLab Pages serves whatever ends up in the `public/` folder, so this job
# just copies the site files there. No build tools needed.
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir .public
    - cp -r * .public          # copy all site files (.public is hidden, so it isn't copied into itself)
    - mv .public public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH   # only publish from the default branch (e.g. main)
